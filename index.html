<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Melbourne — A Historical Guide</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f0e8;
    --chrome:   #1a1612;
    --text:     #2c2416;
    --muted:    #7a6d5a;
    --accent:   #8b3a0f;
    --accent2:  #c4963b;
    --border:   #d4c8b0;
    --panel:    #faf7f2;
    --shadow:   rgba(26,22,18,0.18);
    --ink:      #1a1612;
  }

  body.dark {
    --bg:       #111009;
    --chrome:   #f0e8d8;
    --text:     #e8dfc8;
    --muted:    #9a8f7a;
    --accent:   #d4763a;
    --accent2:  #c4963b;
    --border:   #2e2a22;
    --panel:    #181510;
    --shadow:   rgba(0,0,0,0.5);
    --ink:      #f0e8d8;
  }

  html, body { height: 100%; font-family: 'Lora', Georgia, serif; background: var(--bg); color: var(--text); transition: background 0.4s, color 0.4s; }

  /* ── HEADER ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 12px var(--shadow);
    transition: background 0.4s, border-color 0.4s;
  }

  .header-left { display: flex; align-items: baseline; gap: 12px; }

  .site-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.01em;
    transition: color 0.4s;
  }

  .site-sub {
    font-family: 'Lora', serif;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-style: italic;
    transition: color 0.4s;
  }

  /* ── TOGGLE ── */
  .toggle-btn {
    display: flex; align-items: center; gap: 8px;
    background: none;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'Lora', serif;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
  }
  .toggle-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--bg); }
  .toggle-btn svg { width: 14px; height: 14px; fill: currentColor; }

  /* ── MAP ── */
  #map {
    position: fixed;
    top: 60px; left: 0; right: 0; bottom: 0;
    z-index: 1;
    transition: filter 0.4s;
  }

  /* ── SIDE PANEL ── */
  #panel {
    position: fixed;
    top: 60px; right: -420px; bottom: 0;
    width: 400px;
    z-index: 900;
    background: var(--panel);
    border-left: 1px solid var(--border);
    box-shadow: -4px 0 24px var(--shadow);
    overflow-y: auto;
    transition: right 0.4s cubic-bezier(0.22,1,0.36,1), background 0.4s, border-color 0.4s;
  }
  #panel.open { right: 0; }

  .panel-close {
    position: sticky; top: 0;
    display: flex; justify-content: flex-end;
    padding: 14px 16px 0;
    background: var(--panel);
    z-index: 1;
    transition: background 0.4s;
  }

  .close-btn {
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 1.4rem; line-height: 1;
    padding: 2px 6px;
    border-radius: 3px;
    transition: color 0.2s, background 0.2s;
  }
  .close-btn:hover { color: var(--accent); background: var(--border); }

  .panel-img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    border-bottom: 1px solid var(--border);
    filter: sepia(15%) contrast(0.95);
  }

  .panel-img-placeholder {
    width: 100%; height: 220px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  .panel-img-placeholder svg { opacity: 0.3; }

  .panel-body { padding: 24px 28px 40px; }

  .panel-era {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: 'Lora', serif;
    margin-bottom: 6px;
    transition: color 0.4s;
  }

  .panel-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 4px;
    transition: color 0.4s;
  }

  .panel-subtitle {
    font-style: italic;
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 20px;
    transition: color 0.4s;
  }

  .panel-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
    transition: border-color 0.4s;
  }

  .panel-text {
    font-size: 0.93rem;
    line-height: 1.8;
    color: var(--text);
    transition: color 0.4s;
  }
  .panel-text p + p { margin-top: 1em; }

  .panel-fact {
    margin-top: 22px;
    padding: 14px 18px;
    border-left: 3px solid var(--accent2);
    background: var(--bg);
    border-radius: 0 4px 4px 0;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--muted);
    line-height: 1.6;
    transition: background 0.4s, color 0.4s, border-color 0.4s;
  }

  /* ── LEGEND ── */
  #legend {
    position: fixed;
    bottom: 28px; left: 16px;
    z-index: 900;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px 18px;
    font-size: 0.78rem;
    box-shadow: 0 2px 10px var(--shadow);
    transition: background 0.4s, border-color 0.4s;
    min-width: 160px;
  }

  .legend-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
    letter-spacing: 0.04em;
    transition: color 0.4s;
  }

  .legend-item {
    display: flex; align-items: center; gap: 8px;
    color: var(--muted);
    margin-bottom: 6px;
    transition: color 0.4s;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── CUSTOM PINS ── */
  .custom-marker { cursor: pointer; }

  /* ── ATTRIBUTION PATCH ── */
  .leaflet-control-attribution { font-size: 9px; }

  /* ── SCROLL ── */
  #panel::-webkit-scrollbar { width: 5px; }
  #panel::-webkit-scrollbar-track { background: var(--bg); }
  #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── CATEGORY BADGE ── */
  .cat-badge {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
    margin-bottom: 12px;
    font-family: 'Lora', serif;
  }

  @media (max-width: 600px) {
    #panel { width: 100%; right: -100%; }
    .site-sub { display: none; }
  }
</style>
</head>

<header>
  <div class="header-left">

</header>

<div id="map"></div>

<div id="legend">

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const PLACES = [

    category: "colonial",
    catLabel: "Community",
    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Melbourne_Chinatown.jpg/800px-Melbourne_Chinatown.jpg",
    body: `<p>Melbourne's Chinatown is the oldest permanent Chinese settlement in the Western world, its roots tracing back to the Victorian gold rush of 1851. Thousands of Chinese prospectors arrived seeking fortune on the goldfields, and many settled on Little Bourke Street after facing racial hostility on the fields.</p>
<p>By the 1860s, the street was a dense enclave of boarding houses, herbal medicine shops, gambling dens, and joss houses. The iconic red archways were added much later, in 1974, but the street's bones are unmistakably nineteenth century.</p>`,

<p>The gaol is forever tied to the legend of Ned Kelly, Australia's most notorious bushranger, who was hanged here on 11 November 1880. His death mask and armour remain on display. The armour — hammered from plough mould-boards — weighs 44 kilograms.</p>`,

  },
  {

    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Flinders_Street_Station_at_dusk_in_2007.jpg/800px-Flinders_Street_Station_at_dusk_in_2007.jpg",
    body: `<p>The ochre-domed centrepiece of Melbourne's railway network, Flinders Street Station replaced the original 1854 terminus — the first railway station in Australia. The current building was designed by James Fawcett and H.P.C. Ashworth in an Edwardian baroque style that drew inspiration from Indian architecture.</p>
<p>"Under the clocks" became Melbourne's most iconic meeting point — a phrase embedded in the city's social fabric. The row of clocks above the entrance once displayed the departure time of the next train on each suburban line.</p>`,

  },
  {
    id: 4,

    subtitle: "Swanston Street",

    body: `<p>One of the first free public libraries in the world, the State Library of Victoria opened its doors in February 1856 on land originally reserved by Governor La Trobe. The neoclassical bluestone building was designed by Joseph Reed, who also designed the Royal Exhibition Building.</p>
<p>The magnificent octagonal reading room, topped by its steel-and-glass dome, was completed in 1913 and remains one of Melbourne's great interior spaces. Ned Kelly drafted his famous Jerilderie Letter — a 56-page manifesto — which is now held in the collection.</p>`,

  {

    era: "Opened 1870",
    category: "colonial",

    image: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Royal_Arcade_Melbourne.jpg/600px-Royal_Arcade_Melbourne.jpg",
    body: `<p>Melbourne's oldest surviving shopping arcade, Royal Arcade was built in 1869–70 to designs by Charles Webb. It stretches between Bourke Street and Little Collins Street, its ornate Victorian ceiling and mosaic tile floor largely intact from the original construction.</p>
<p>At each end of the arcade stand the figures of Gog and Magog — mythological giants based on those at London's Guildhall. Each hour they raise their clubs to strike the bell of the clock above. The figures were installed in 1892.</p>`,
    fact: "The arcade was declared a Victorian Heritage Register place in 1989. The original shop leases stipulated that tenants must not operate \"offensive trades\" such as tallow chandlers or fish mongers."

  {

    body: `<p>Built at the height of Marvellous Melbourne's land boom, Block Arcade is arguably the city's most beautiful interior. Designed by David C. Askew in a style inspired by Milan's Galleria Vittorio Emanuele II, the arcade features a mosaic floor imported from Italy, ornate plasterwork, and a glazed roof that floods the space with light.</p>

<p>At its peak in the 1880s, Melbourne was one of the busiest ports in the British Empire. The Long Room — now the museum's central hall — once processed import duties on goods worth millions of pounds annually.</p>`,

  {
    id: 8,

    era: "Consecrated 1891",
    category: "colonial",

    body: `<p>Occupying one of Melbourne's most prominent corners, St Paul's Cathedral was designed by William Butterfield — a leading proponent of the Victorian Gothic Revival style — who designed the building entirely from London without ever visiting Australia. The foundation stone was laid in 1880.</p>
<p>Construction spanned decades due to funding disputes and a Great Depression. The spires you see today were not added until 1931–32, forty years after the main structure was consecrated. The interior features elaborate tile work and stained glass.</p>`,

  },
  {

    body: `<p>The Melbourne Town Hall is a statement of civic ambition in sandstone and bluestone, its grand portico and clock tower dominating the intersection of Collins and Swanston. The main building was completed in 1867 to designs by Joseph Reed, with extensions added in 1887 to accommodate Melbourne's explosive growth.</p>
<p>The Great Hall has hosted royalty, state funerals, protest meetings, boxing matches, and rock concerts. The Beatles played here in June 1964 to 5,000 screaming fans. The organ — installed in 1929 — is one of the largest in the Southern Hemisphere.</p>`,

  },
  {

    era: "Built 1856",
    category: "colonial",
    catLabel: "Colonial Government",

    body: `<p>Built atop Eastern Hill — one of Melbourne's highest points — Parliament House commands the eastern end of Bourke Street with a Greek Revival colonnade of extraordinary scale. Construction began in 1856 for the newly self-governing Colony of Victoria, flush with gold-rush revenue.</p>
<p>The building has never been fully completed — the central dome was planned but never built due to financial constraints. For 26 years from 1901, it served as the provisional home of the federal Parliament while Canberra was being built.</p>`,

    body: `<p>The Princess Theatre is Melbourne's oldest and most ornate live theatre, a Second Empire baroque confection of cream stucco and slate mansard roofing. Designed by William Pitt in 1886, it replaced an earlier theatre on the same site and quickly became the premier venue for international touring productions.</p>
<p>The theatre is said to be haunted by Frederick Baker, known as Federici, a baritone who collapsed and died on stage during a performance of Faust in 1888. Staff have reported seeing him in his box, still attending performances.</p>`,

    body: `<p>Occupying Melbourne's highest natural rise, Flagstaff Gardens takes its name from the signal station established here in the 1840s. A flagstaff was raised to alert colonists to the arrival of ships in Port Phillip Bay — an event of enormous importance when the mail ship from England was the colony's only link to home.</p>
<p>The hill was also used as an unofficial burial ground in Melbourne's earliest days. Graves from the 1830s have been uncovered during various construction works. The gardens were formally laid out in 1862 after Governor La Trobe reserved the land from private sale.</p>`,

// ── CATEGORY COLOURS ─────────────────────────────────────────────────────
const CAT_COLORS = {
  colonial: "#8b3a0f",
  market:   "#2e6b4f",
  landmark: "#1a4a7a",
  culture:  "#6b3a7d",
  trough:   "#7a5a1a",
  crime:    "#3a3a3a"
};

// ── MAP SETUP ─────────────────────────────────────────────────────────────
const LIGHT_TILES = "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png";
const DARK_TILES  = "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png";
const ATTRIBUTION = '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>';

let isDark = false;
let tileLayer;

const map = L.map('map', {
  center: [-37.8136, 144.9631],
  zoom: 15,
  zoomControl: true
});

tileLayer = L.tileLayer(LIGHT_TILES, {
  attribution: ATTRIBUTION,
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// ── CUSTOM MARKER ─────────────────────────────────────────────────────────
function makeIcon(color) {
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
      <path d="M13 0C5.82 0 0 5.82 0 13c0 9.75 13 21 13 21s13-11.25 13-21C26 5.82 20.18 0 13 0z" fill="${color}" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
      <circle cx="13" cy="13" r="5" fill="rgba(255,255,255,0.9)"/>
    </svg>`;
  return L.divIcon({
    html: svg,
    className: 'custom-marker',
    iconSize: [26, 34],
    iconAnchor: [13, 34],
    popupAnchor: [0, -34]
  });
}

// ── ADD MARKERS ───────────────────────────────────────────────────────────
PLACES.forEach(place => {
  const color = CAT_COLORS[place.category] || "#555";
  const marker = L.marker([place.lat, place.lng], { icon: makeIcon(color) });

  marker.bindTooltip(`<span style="font-family:'Lora',serif;font-size:12px;font-weight:500">${place.name}</span><br><span style="font-size:10px;color:#888;font-style:italic">${place.era}</span>`, {
    direction: 'top',
    offset: [0, -30]
  });

  marker.on('click', () => openPanel(place));
  marker.addTo(map);
});

// ── PANEL LOGIC ───────────────────────────────────────────────────────────
function openPanel(place) {
  const color = CAT_COLORS[place.category] || "#555";
  const imgHtml = place.image
    ? `<img class="panel-img" src="${place.image}" alt="${place.name}" onerror="this.parentElement.innerHTML='<div class=\\'panel-img-placeholder\\'><svg width=48 height=48 viewBox=\\'0 0 24 24\\'><path d=\\'M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zm-8.5-5.5l2.03 2.71L17 13l4 5H3l3.5-4.5 2 2.5z\\' fill=\\'currentColor\\'/></svg></div>'">`
    : `<div class="panel-img-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" style="color:var(--muted)"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zm-8.5-5.5l2.03 2.71L17 13l4 5H3l3.5-4.5 2 2.5z" fill="currentColor"/></svg></div>`;

  document.getElementById('panel-content').innerHTML = `
    ${imgHtml}
    <div class="panel-body">
      <div class="panel-era">${place.era}</div>
      <h2 class="panel-title">${place.name}</h2>
      <div class="panel-subtitle">${place.subtitle}</div>
      <span class="cat-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${place.catLabel}</span>
      <hr class="panel-divider">
      <div class="panel-text">${place.body}</div>
      ${place.fact ? `<div class="panel-fact">⬡ &nbsp;${place.fact}</div>` : ''}
    </div>`;

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
}

// ── MODE TOGGLE ───────────────────────────────────────────────────────────
function toggleMode() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);

  map.removeLayer(tileLayer);
  tileLayer = L.tileLayer(isDark ? DARK_TILES : LIGHT_TILES, {
    attribution: ATTRIBUTION,
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  document.getElementById('toggleLabel').textContent = isDark ? 'Day Map' : 'Night Map';

  const icon = document.getElementById('toggleIcon');
  if (isDark) {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    icon.setAttribute('stroke', 'currentColor');
    icon.setAttribute('fill', 'none');
    icon.setAttribute('stroke-width', '2');
    icon.setAttribute('stroke-linecap', 'round');
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
    icon.setAttribute('fill', 'currentColor');
    icon.removeAttribute('stroke');
  }
}

// Close panel when clicking map
map.on('click', closePanel);
</script>
